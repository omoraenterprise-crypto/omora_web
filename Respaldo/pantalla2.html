<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantalla de Carga - OMORA</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background-color: #4301dd; /* Azul de fondo */
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .loader {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .loader img.logo {
      width: 410px;
      animation: pulse 1.5s infinite ease-in-out;
    }

    .loader p {
      color: white;
      font-family: Arial, sans-serif;
      font-size: 18px;
      margin-top: 15px;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Huellitas en vez de puntos */
    .dots {
      display: inline-flex;
    }

    .dot {
      display: inline-block;
      width: 18px;   /* tamaño de cada huellita */
      height: 18px;
      margin: 0 4px;
      background-image: url('./imagenes/OmoraSinFondo.png'); /* tu huella */
      background-size: contain;
      background-repeat: no-repeat;
      animation: bounce 1.5s infinite;
    }

    .dot:nth-child(1) {
      animation-delay: 0s;
    }
    .dot:nth-child(2) {
      animation-delay: 0.4s;
    }
    .dot:nth-child(3) {
      animation-delay: 0.8s;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.2; }
      50% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.6; }
      40% { transform: scale(1.3); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="loader">
    <img class="logo" src="./imagenes/OmoraSinFondo.png" alt="Huella OMORA">
    <p>
      Loading
      <span class="dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </span>
    </p>
  </div>

  <script>
    // Simulación de carga (3 segundos)
    setTimeout(() => {
      document.querySelector(".loader").style.display = "none";
      document.body.innerHTML = "<h1 style='color:white; text-align:center;'>¡OMORA PRÓXIMAMENTE!</h1>";
    }, 3000);
  </script>
</body>
</html>
