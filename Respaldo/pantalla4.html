<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantalla de Carga - OMORA</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background-color: #4301dd; /* Azul de fondo */
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .loader {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .loader img.logo {
      width: 410px;
      animation: pulse 1.5s infinite ease-in-out;
    }

    .trail {
      margin-top: 40px;
      position: relative;
      width: 200px;
      height: 120px;
    }

    /* Huellas */
    .paw {
      position: absolute;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      opacity: 0;
      transform: scale(0.5);
      animation: step 2s infinite;
    }

    .paw::before,
    .paw::after {
      content: "";
      position: absolute;
      width: 7px;
      height: 7px;
      background: white;
      border-radius: 50%;
    }

    .paw::before { top: -6px; left: 0; }
    .paw::after { top: -6px; right: 0; }

    .paw span {
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 7px;
      height: 7px;
      background: white;
      border-radius: 50%;
    }

    /* Posiciones de las huellas */
    .paw:nth-child(1) { left: 0; top: 80px; animation-delay: 0s; }
    .paw:nth-child(2) { left: 40px; top: 60px; animation-delay: 0.3s; }
    .paw:nth-child(3) { left: 80px; top: 40px; animation-delay: 0.6s; }
    .paw:nth-child(4) { left: 120px; top: 20px; animation-delay: 0.9s; }
    .paw:nth-child(5) { left: 160px; top: 0; animation-delay: 1.2s; }

    /* Animaciones */
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.2; }
      50% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }

    @keyframes step {
      0% { opacity: 0; transform: scale(0.5); }
      20% { opacity: 1; transform: scale(1); }
      60% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.5); }
    }
  </style>
</head>
<body>
  <div class="loader">
    <img class="logo" src="./imagenes/OmoraSinFondo.png" alt="Huella OMORA">
    <div class="trail">
      <div class="paw"><span></span></div>
      <div class="paw"><span></span></div>
      <div class="paw"><span></span></div>
      <div class="paw"><span></span></div>
      <div class="paw"><span></span></div>
    </div>
  </div>

  <script>
    // Simulación de carga (3 segundos)
    setTimeout(() => {
      document.querySelector(".loader").style.display = "none";
      document.body.innerHTML = "<h1 style='color:white; text-align:center;'>¡OMORA PRÓXIMAMENTE!</h1>";
    }, 3000);
  </script>
</body>
</html>
