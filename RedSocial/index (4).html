<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OMORA - Red Social de adopción</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../assets/css/theme.css">
  <link rel="stylesheet" href="../assets/css/base.css">

  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header role="banner" aria-label="Barra de navegación superior">
    <div class="logo" tabindex="0">OMORA</div>
    <nav role="navigation" aria-label="Menú principal">
      <button id="homeBtn" class="nav-button" aria-current="page" aria-label="Inicio">Inicio</button>
      <li><a href="buscar.html">Buscar</a></li>
      <button id="searchBtn" class="nav-button" aria-label="Buscar">Buscar</button>
      <button id="notificationsBtn" class="nav-button" aria-label="Notificaciones">Notificaciones</button>
      <button id="profileBtn" class="nav-button" aria-label="Perfil">Perfil</button>
    </nav>
  </header>

  <main class="container" role="main" id="mainContent" tabindex="-1">
    <!-- Stories -->
    <section class="stories" aria-label="Historias" role="list" id="storiesList"></section>
    <!-- Feed -->
    <section class="feed" aria-label="Publicaciones" id="feed"></section>
  </main>

  <footer>
    &copy; 2025 OMORA &mdash; Red Social de adopción
  </footer>

  <!-- Story modal -->
  <div class="story-modal" role="dialog" aria-modal="true" aria-label="Historia" tabindex="-1" id="storyModal">
    <div class="modal-header">
      <img src="" alt="Avatar del usuario" />
      <div class="username">Username</div>
      <button class="close-btn" aria-label="Cerrar historia">&times;</button>
    </div>
    <div class="progress-bar-container" aria-hidden="true"></div>
    <div class="story-image-container">
      <img src="" alt="Imagen de la historia" />
      <button class="nav-arrow left" aria-label="Historia anterior">&#10094;</button>
      <button class="nav-arrow right" aria-label="Historia siguiente">&#10095;</button>
      <div class="nav-touch-left" aria-hidden="true"></div>
      <div class="nav-touch-right" aria-hidden="true"></div>
    </div>
  </div>

  /<!-- Search modal -->
  <div id="searchModal" role="dialog" aria-modal="true" aria-label="Buscar" tabindex="-1" style="display: none; position: fixed; inset: 0; background: rgba(255 255 255 / 0.95); z-index: 1600; padding: 1rem; overflow-y: auto; -webkit-overflow-scrolling: touch;">
    <button id="closeSearchBtn" aria-label="Cerrar búsqueda" style="position: fixed; top: 1rem; right: 1rem; padding: 0.5rem 1rem; font-size: 1.25rem; font-weight: 700; cursor: pointer; border: none; background: var(--color-accent); color: white; border-radius: var(--radius);">×</button>
    <h2 style="font-weight: 700; font-size: 1.5rem; margin-bottom: 1rem;">Buscar en OMORA</h2>
    <input type="search" id="searchInput" placeholder="Buscar usuarios o posts..." aria-label="Buscar usuarios o posts" style="width: 100%; padding: 0.75rem 1rem; font-size: 1rem; border: 1px solid var(--color-border); border-radius: var(--radius); margin-bottom: 1rem;" />
    <section aria-label="Resultados de búsqueda" id="searchResults"></section>
  </div>

  <!-- Notifications modal -->
  <div id="notificationsModal" role="dialog" aria-modal="true" aria-label="Notificaciones" tabindex="-1" style="display: none; position: fixed; inset: 0; background: rgba(255 255 255 / 0.95); z-index: 1600; padding: 1rem; overflow-y: auto; -webkit-overflow-scrolling: touch;">
    <button id="closeNotificationsBtn" aria-label="Cerrar notificaciones" style="position: fixed; top: 1rem; right: 1rem; padding: 0.5rem 1rem; font-size: 1.25rem; font-weight: 700; cursor: pointer; border: none; background: var(--color-accent); color: white; border-radius: var(--radius);">×</button>
    <h2 style="font-weight: 700; font-size: 1.5rem; margin-bottom: 1rem;">Notificaciones</h2>
    <ul id="notificationsList" style="list-style:none; padding:0; margin:0;"></ul>
  </div>

  <!-- Profile modal -->
  <div id="profileModal" role="dialog" aria-modal="true" aria-label="Perfil de usuario" tabindex="-1" style="display: none; position: fixed; inset: 0; background: rgba(255 255 255 / 0.95); z-index: 1600; padding: 1rem; overflow-y: auto; -webkit-overflow-scrolling: touch; max-width: 900px; margin: 0 auto; border-radius: var(--radius); box-shadow: var(--shadow-hover);">
    <button id="closeProfileBtn" aria-label="Cerrar perfil" style="position: fixed; top: 1rem; right: 1rem; padding: 0.5rem 1rem; font-size: 1.25rem; font-weight: 700; cursor: pointer; border: none; background: var(--color-accent); color: white; border-radius: var(--radius);">×</button>
    <div id="profileContent" tabindex="0" style="outline:none;"></div>
  </div>

    <script src="../assets/js/theme.js"></script>


  <script src="./script.js"></script>
</body>
</html>
