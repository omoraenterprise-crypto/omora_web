<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | Omora Shop 🐾</title>

    <!-- FAVICON -->
    <link rel="icon" type="image/png" sizes="32x32" href="../imagenes/Omora Madrid.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../imagenes/Omora Madrid.png">
    <link rel="apple-touch-icon" href="../imagenes/Omora Madrid.png">
    <meta name="theme-color" content="#5c3cfb">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <div class="profile-container">
        <header class="profile-header">
            <a href="../Shopping_platform/Shopping_platform.html" class="back-link">
                <span class="icon">⬅️</span> Volver a la tienda
            </a>
        </header>
        
        <main class="profile-card">
            <div class="profile-hero">
                <div class="avatar-wrapper">
                    <img src="https://via.placeholder.com/150" id="userAvatar" alt="Avatar">
                    <label for="fileInput" class="camera-icon"><i>📷</i></label>
                    <input type="file" id="fileInput" hidden accept="image/*">
                </div>
                <div class="user-info">
                    <h2 id="displayUserName">Cargando...</h2>
                    <span class="badge">Socio Omora Premium 🐾</span>
                </div>
            </div>

            <div class="profile-divider"></div>

            <form id="profileForm" class="profile-form">
                <div class="form-grid">
                    <div class="input-group">
                        <label>Nombre Completo</label>
                        <input type="text" id="inputName" placeholder="Tu nombre" required>
                    </div>
                    <div class="input-group">
                        <label>Teléfono de Contacto</label>
                        <input type="tel" id="inputPhone" placeholder="+57 300...">
                    </div>
                    <div class="input-group full-width">
                        <label>Dirección de Envío</label>
                        <input type="text" id="inputAddress" placeholder="Calle, Ciudad, Depto">
                    </div>
                </div>
                <div class="actions">
                    <button type="submit" id="saveBtn" class="save-btn">
                        Guardar Cambios 🚀
                    </button>
                </div>
            </form>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBtGVfaEKbVXWCvTvA3t_XRZ6PK28pL5rc",
            authDomain: "omora-55e66.firebaseapp.com",
            projectId: "omora-55e66",
            storageBucket: "omora-55e66.firebasestorage.app",
            messagingSenderId: "860384804554",
            appId: "1:860384804554:web:d59b9e0732619814d1be33"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const CLOUDINARY_URL = 'https://api.cloudinary.com/v1_1/dl8hi11bd/image/upload'; 
        const UPLOAD_PRESET = 'ty81bmru'; 

        // Detectar usuario y cargar sus datos
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, "usuarios", user.uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('userAvatar').src = data.photoURL || "https://via.placeholder.com/150";
                    document.getElementById('displayUserName').innerText = data.nombre || "Usuario Omora";
                    document.getElementById('inputName').value = data.nombre || "";
                    document.getElementById('inputPhone').value = data.telefono || "";
                    document.getElementById('inputAddress').value = data.direccion || "";
                } else {
                    document.getElementById('displayUserName').innerText = "Nuevo Miembro 🐾";
                }
            } else {
                window.location.href = "../Login/login.html";
            }
        });

        // Subida de imagen a Cloudinary
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = "Subiendo imagen... 📷";
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);

            try {
                const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
                const data = await res.json();
                const optimizedUrl = data.secure_url.replace('/upload/', '/upload/w_400,h_400,c_fill,g_face/');
                document.getElementById('userAvatar').src = optimizedUrl;
                alert("Foto cargada. ¡No olvides Guardar Cambios!");
            } catch (err) { alert("Error al subir a Cloudinary"); }
            finally { btn.innerHTML = "Guardar Cambios 🚀"; }
        });

        // Guardar en Firestore
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = auth.currentUser;
            if(!user) return;

            const userData = {
                nombre: document.getElementById('inputName').value,
                telefono: document.getElementById('inputPhone').value,
                direccion: document.getElementById('inputAddress').value,
                photoURL: document.getElementById('userAvatar').src,
                uid: user.uid,
                email: user.email
            };

            try {
                await setDoc(doc(db, "usuarios", user.uid), userData, { merge: true });
                alert("¡Perfil de Omora actualizado! 🐾");
                window.location.href = "../Shopping_platform/Shopping_platform.html";
            } catch (err) { console.error(err); alert("Error al guardar datos"); }
        });
    </script>
</body>
</html>
