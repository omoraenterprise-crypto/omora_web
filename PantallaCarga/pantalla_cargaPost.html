<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantalla de Carga - OMORA</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background-color: #4301dd; /* Azul de fondo */
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .loader {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .loader img.logo {
      width: 410px;
      animation: pulse 1.5s infinite ease-in-out;
    }

    .loader p {
      color: white;
      font-family: Arial, sans-serif;
      font-size: 18px;
      margin-top: 15px;
      letter-spacing: 2px;
    }

    /* Huellitas con imagen */
    .trail {
      margin-top: 20px;
      position: relative;
      width: 120px;
      height: 60px;
    }

    .paw {
      position: absolute;
      width: 28px;   /* tamaño huella */
      opacity: 0;
      animation: appear 2s infinite;
    }

    /* Posiciones diagonales (como caminando) */
    .paw:nth-child(1) { left: 0; top: 40px; animation-delay: 0s; }
    .paw:nth-child(2) { left: 30px; top: 20px; animation-delay: 0.4s; }
    .paw:nth-child(3) { left: 60px; top: 40px; animation-delay: 0.8s; }
    .paw:nth-child(4) { left: 90px; top: 20px; animation-delay: 1.2s; }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.2; }
      50% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }

    @keyframes appear {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      40% { opacity: 1; transform: scale(1); }
      60% { opacity: 1; transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <div class="loader">
    <img class="logo" src="./imagenes/OmoraSinFondo.png" alt="Huella OMORA">
    <p>Loading.....</p>

    <!-- Huellas caminando con imagen -->
    <div class="trail">
      <img class="paw" src="./imagenes/HuellaSinFondo.png" alt="huella">
      <img class="paw" src="./imagenes/HuellaSinFondo.png" alt="huella">
      <img class="paw" src="./imagenes/HuellaSinFondo.png" alt="huella">
      <img class="paw" src="./imagenes/HuellaSinFondo.png" alt="huella">
    </div>
  </div>

  <script>
    // Simulación de carga (3 segundos)
    setTimeout(() => {
      document.querySelector(".loader").style.display = "none";
      document.body.innerHTML = "<h1 style='color:white; text-align:center;'>¡OMORA PRÓXIMAMENTE!</h1>";
    }, 3000);
  </script>
</body>
</html>
