<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Adopta con OMORA | Login 🐾</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="../imagenes/Omora Madrid.png">
    <meta name="theme-color" content="#5c3cfb">
    
    <link rel="stylesheet" href="../assets/css/theme.css">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="./login.css">
</head>
<body>

<div class="background">
    <div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1558788353-f76d92427f16');"></div>
    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1517849845537-4d257902454a');"></div>
    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1598133894008-61f7fdb8cc3a');"></div>
    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1543852786-1cf6624b9987');"></div>
    <div class="overlay"></div>
</div>

<div class="container">
    <div class="hero">
        <h1>ADOPTA CON OMORA</h1>
        <h3>Siempre es mucho mejor que comprarlo</h3>
        <p>
            En OMORA conectamos personas con animales que necesitan un hogar,
            promoviendo la adopción responsable y el bienestar animal.
        </p>
    </div>

    <div class="login-card">
        <h2>Iniciar sesión</h2>

        <input type="email" id="email" placeholder="Correo electrónico" required>
        <input type="password" id="password" placeholder="Contraseña" required>

        <button id="loginBtn" class="login-btn">Ingresar</button>

        <div class="links">
            <a href="./recuperaracceso.html">¿Olvidaste tu contraseña?</a>
            <a href="./registro.html">¿No tienes cuenta? Regístrate</a>
        </div>
    </div>
</div>

<script src="../assets/js/theme.js"></script>
<script type="module" src="./login.js"></script>

</body>
</html>
