<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Descargar OMORA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./download.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">OM<span>ORA</span></div>

    <nav class="nav" id="navMenu">
      <a href="#">Inicio</a>
      <a href="#">Nosotros</a>
      <a href="#">Descargar</a>
      <a href="#">Contacto</a>
    </nav>

    <div class="header-actions">
      <a href="#" class="btn-login">Iniciar sesión</a>
      <button class="hamburger" id="hamburgerBtn" aria-label="Abrir menú" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <div class="nav-overlay" id="navOverlay"></div>

  <!-- HERO DESCARGA -->
  <section class="descarga-hero">
    <div class="descarga-texto">
      <h1>Descarga OMORA en tu teléfono</h1>
      <p>Instala la app y llévala contigo a todas partes. Descarga el APK directamente y empieza a usarla en minutos.</p>

      <div class="descarga-botones">
        <a href="https://expo.dev/artifacts/eas/pJ2fXtqUsbreXy_E6OFroos2umzwMWdEU2B3NuT9XtU.apk" download="omora.apk" class="badge-descarga">
          <span style="font-size:26px;">⬇️</span>
          <span class="badge-texto">
            <span class="badge-small">Descargar para</span>
            <span class="badge-big">Android (APK)</span>
          </span>
        </a>
      </div>
    </div>

    <div class="descarga-imagen">
      <div class="phone-mockup">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <div class="phone-app-logo">🌙</div>
          <div class="phone-app-nombre">OMORA</div>
          <div class="phone-app-linea"></div>
          <div class="phone-app-linea corta"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    © 2026 OMORA. Todos los derechos reservados.
  </footer>

  <script>
    // ============================================
    // MENÚ HAMBURGUESA (móvil / tablet)
    // Mueve el <nav> directamente al <body> cuando se abre,
    // así queda garantizado por encima de todo, sin depender
    // de ningún z-index heredado del header.
    // ============================================
    (function () {
      const hamburger = document.getElementById('hamburgerBtn');
      const navMenu = document.getElementById('navMenu');
      const overlay = document.getElementById('navOverlay');

      if (!hamburger || !navMenu || !overlay) return;

      const navParentOriginal = navMenu.parentNode;
      const navNextSiblingOriginal = navMenu.nextSibling;

      function abrirMenu() {
        document.body.appendChild(overlay);
        document.body.appendChild(navMenu);

        hamburger.classList.add('active');
        navMenu.classList.add('active');
        overlay.classList.add('active');
        hamburger.setAttribute('aria-expanded', 'true');
        document.body.style.overflow = 'hidden';
      }

      function cerrarMenu() {
        hamburger.classList.remove('active');
        navMenu.classList.remove('active');
        overlay.classList.remove('active');
        hamburger.setAttribute('aria-expanded', 'false');
        document.body.style.overflow = '';

        if (navNextSiblingOriginal) {
          navParentOriginal.insertBefore(navMenu, navNextSiblingOriginal);
        } else {
          navParentOriginal.appendChild(navMenu);
        }
      }

      hamburger.addEventListener('click', () => {
        const estaAbierto = navMenu.classList.contains('active');
        estaAbierto ? cerrarMenu() : abrirMenu();
      });

      overlay.addEventListener('click', cerrarMenu);

      navMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', cerrarMenu);
      });

      window.addEventListener('resize', () => {
        if (window.innerWidth > 768) cerrarMenu();
      });
    })();
  </script>

</body>
</html>
